name: Wayzza Enterprise CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: 'frontend/package-lock.json'

    - name: Install Frontend Dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Run Frontend Linter
      working-directory: ./frontend
      run: npm run lint

    - name: Build Frontend Application
      working-directory: ./frontend
      run: npm run build

    - name: Install Backend Dependencies
      working-directory: ./backend
      run: npm ci

    - name: Backend Smoke Test (Health Check)
      working-directory: ./backend
      env:
        NODE_ENV: test
        PORT: 5001
        JWT_SECRET: ci-test-secret-not-for-production
        MONGO_URL: ${{ secrets.MONGO_URL || 'mongodb://127.0.0.1:27017/ci_test' }}
        RAZORPAY_KEY_ID: ci-dummy-razorpay-key
        RAZORPAY_KEY_SECRET: ci-dummy-razorpay-secret
      run: |
        node server.js > server.log 2>&1 &
        SERVER_PID=$!
        sleep 5
        if ! curl --fail --retry 3 --retry-delay 2 http://127.0.0.1:5001/api/v1/health; then
          echo "Server failed to start or health check failed. Server logs:"
          cat server.log
          kill $SERVER_PID
          exit 1
        fi
        kill $SERVER_PID
